# docker-compose.yml
# Serviços da aplicação — gerenciado pelo terminal do devcontainer.
# SEGURANÇA: apenas para desenvolvimento local.

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: concurso_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-concurso_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-concurso_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-concurso_user} -d ${POSTGRES_DB:-concurso_platform}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - concurso_net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: concurso_redis
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pass} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - concurso_net

  # ── Flask API ──────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: concurso_api
    restart: unless-stopped
    volumes:
      # Hot reload: código local refletido no container
      - ./api:/workspace:cached
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: "1"
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-sa-east-1}
      PROJECT_NAME: ${PROJECT_NAME:-concurso-platform}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-concurso_user}:${POSTGRES_PASSWORD:-dev_pass_123}@postgres:5432/${POSTGRES_DB:-concurso_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod-32bytes!!}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-key-change-in-prod-32bytes!!!}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concurso_net
    command: flask run --host=0.0.0.0 --port=5000 --debug

  # ── Celery Worker ──────────────────────────────────────────
  celery:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: concurso_celery
    restart: unless-stopped
    volumes:
      - ./api:/workspace:cached
    environment:
      FLASK_APP: app
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-concurso_user}:${POSTGRES_PASSWORD:-dev_pass_123}@postgres:5432/${POSTGRES_DB:-concurso_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod-32bytes!!}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-key-change-in-prod-32bytes!!!}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concurso_net
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  # ── Flower ─────────────────────────────────────────────────
  flower:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: concurso_flower
    restart: unless-stopped
    volumes:
      - ./api:/workspace:cached
    ports:
      - "5555:5555"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod-32bytes!!}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-key-change-in-prod-32bytes!!!}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      PYTHONUNBUFFERED: "1"
    depends_on:
      - redis
    networks:
      - concurso_net
    command: >
      celery -A app.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower_pass}

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

    # ── Rede ───────────────────────────────────────────────────
networks:
  concurso_net:
    driver: bridge
