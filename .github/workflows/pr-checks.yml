# .github/workflows/pr-checks.yml
name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python formatting (black)
        run: |
          pip install black flake8
          cd api
          black --check app/ --line-length 100 || echo "⚠️ Formatting issues found"
          flake8 app/ --max-line-length=100 --exclude=migrations/ --count || echo "⚠️ Lint issues found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check TypeScript strict
        run: |
          cd frontend
          npm ci --legacy-peer-deps --silent
          npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "validator.ts" | grep -v ".next/" | head -20