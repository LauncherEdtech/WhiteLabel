# .github/workflows/ci.yml
name: CI — Testes e Qualidade

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-flask

      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          PYTHONPATH: ${{ github.workspace }}/api
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
        run: |
          cd api
          pytest tests/ -v --cov=app --cov-report=xml 

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: api/coverage.xml
          flags: backend

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "validator.ts" | grep -v ".next/" || true
          ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | grep -v "validator.ts" | grep -v ".next/" | wc -l)
          echo "TypeScript errors: $ERRORS"
          if [ "$ERRORS" -gt "0" ]; then exit 1; fi

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: https://api.plataforma.com/api/v1
        run: cd frontend && npm run build

  # ── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: api/
          severity: CRITICAL,HIGH
          exit-code: 0  # Não falha o CI mas reporta