# .github/workflows/deploy.yml
name: Deploy — Produção

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: production
        type: choice
        options: [staging, production]

env:
  AWS_REGION: sa-east-1
  CLUSTER: concurso-platform-cluster
  GHCR_IMAGE: ghcr.io/launcheredtech/whitelabel/api

jobs:
  # ── Testes e qualidade ─────────────────────────────────────────────────────
  ci:
    name: CI — Testes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Instalar dependências Python
        run: cd api && pip install -r requirements.txt pytest pytest-flask

      - name: Rodar testes backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-for-ci
          JWT_SECRET_KEY: test-jwt-for-ci
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          PYTHONPATH: ${{ github.workspace }}/api
        run: cd api && pytest tests/ -x -q --tb=short

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências frontend
        run: cd frontend && npm ci --legacy-peer-deps

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Build e Push para GHCR ────────────────────────────────────────────────
  build:
    name: Build & Push → GHCR
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ env.GHCR_IMAGE }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: api/
          file: api/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy na AWS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy → AWS ECS
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Migrations ANTES do novo código ────────────────────────────────
      - name: Rodar migrations
        run: |
          echo "→ Iniciando migration task..."
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.CLUSTER }}" \
            --task-definition concurso-platform-api \
            --launch-type FARGATE \
            --overrides '{"containerOverrides":[{"name":"api","command":["flask","db","upgrade"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_ID }}],securityGroups=[${{ secrets.ECS_SG_ID }}],assignPublicIp=ENABLED}" \
            --query "tasks[0].taskArn" \
            --output text)

          echo "→ Aguardando: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "${{ env.CLUSTER }}" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration falhou (exit: $EXIT_CODE)"
            exit 1
          fi
          echo "✓ Migrations OK"

      # ── Deploy API ──────────────────────────────────────────────────────
      - name: Deploy API
        env:
          NEW_IMAGE: ${{ env.GHCR_IMAGE }}:${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition concurso-platform-api \
            --query taskDefinition --output json)

          NEW_TASK=$(echo "$TASK_DEF" | jq \
            --arg img "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
             | .containerDefinitions |= map(if .name == "api" then .image = $img else . end)')

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --query taskDefinition.taskDefinitionArn --output text)

          aws ecs update-service \
            --cluster "${{ env.CLUSTER }}" \
            --service concurso-platform-api \
            --task-definition "$ARN" \
            --force-new-deployment \
            --query "service.serviceName" --output text

          echo "✓ API → $ARN"

      # ── Deploy Celery ───────────────────────────────────────────────────
      - name: Deploy Celery
        env:
          NEW_IMAGE: ${{ env.GHCR_IMAGE }}:${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition concurso-platform-celery \
            --query taskDefinition --output json)

          NEW_TASK=$(echo "$TASK_DEF" | jq \
            --arg img "$NEW_IMAGE" \
            'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
             | .containerDefinitions |= map(if .name == "celery" then .image = $img else . end)')

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK" \
            --query taskDefinition.taskDefinitionArn --output text)

          aws ecs update-service \
            --cluster "${{ env.CLUSTER }}" \
            --service concurso-platform-celery \
            --task-definition "$ARN" \
            --force-new-deployment \
            --query "service.serviceName" --output text

          echo "✓ Celery → $ARN"

      # ── Aguarda estabilização ───────────────────────────────────────────
      - name: Aguardar API estabilizar
        run: |
          echo "→ Aguardando ECS estabilizar..."
          aws ecs wait services-stable \
            --cluster "${{ env.CLUSTER }}" \
            --services concurso-platform-api
          echo "✓ Estável"

      - name: Resumo
        if: success()
        run: |
          echo "✅ Deploy concluído"
          echo "   SHA:      ${{ github.sha }}"
          echo "   Imagem:   ${{ env.GHCR_IMAGE }}:${{ github.sha }}"
          echo "   Frontend: Vercel (automático)"

      - name: Falha
        if: failure()
        run: echo "❌ Deploy falhou — ${{ github.sha }}" && exit 1